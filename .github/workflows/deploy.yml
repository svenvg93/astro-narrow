name: Deploy Example Site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure GitHub Pages paths
        run: |
          if [ "${{ github.event.repository.name }}" = "${{ github.repository_owner }}.github.io" ]; then
            echo "ASTRO_SITE=https://${{ github.repository_owner }}.github.io" >> "$GITHUB_ENV"
            echo "ASTRO_BASE=/" >> "$GITHUB_ENV"
          else
            echo "ASTRO_SITE=https://${{ github.repository_owner }}.github.io" >> "$GITHUB_ENV"
            echo "ASTRO_BASE=/${{ github.event.repository.name }}" >> "$GITHUB_ENV"
          fi

      - name: Build and upload
        uses: withastro/action@v6
        with:
          package-manager: pnpm@11.6.0

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
